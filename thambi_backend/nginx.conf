# REDIRECT ALL HTTP TO HTTPS
server {
    listen 80;
    server_name thambi.in api.thambi.in menu.thambi.in;
    return 301 https://$host$request_uri;
}

# Customer Menu App - Root Domain (HTTPS)
server {
    listen 443 ssl;
    server_name thambi.in menu.thambi.in;

    ssl_certificate /etc/letsencrypt/live/api.thambi.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.thambi.in/privkey.pem;

    location / {
        proxy_pass http://localhost:8082;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}

# Backend API (HTTPS)
