# 1. FORCE HTTPS FOR EVERYTHING
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    return 301 https://$host$request_uri;
}

# 2. BACKEND API (HTTPS)
server {
    listen 443 ssl;
    server_name api.thambi.in;
    client_max_body_size 10M;

    ssl_certificate /etc/letsencrypt/live/api.thambi.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.thambi.in/privkey.pem;

    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}

# 3. CUSTOMER FRONTEND (HTTPS)
server {
    listen 443 ssl;
    server_name thambi.in menu.thambi.in;
    client_max_body_size 10M;

    ssl_certificate /etc/letsencrypt/live/api.thambi.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.thambi.in/privkey.pem;

    location / {
        proxy_pass http://localhost:8082;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
